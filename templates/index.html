{{define "index.html"}}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictionary — Localitas</title>
    <base href="{{.BasePath}}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2/dist/tailwind.min.css" rel="stylesheet">
    <style>
        :root {
            --color-bg-base: #fcfbfe; --color-bg-elevated: #f0eef7;
            --color-text-primary: #1a1625; --color-text-secondary: #4a3f5c;
            --color-glass-base: rgba(255, 255, 255, 0.75);
            --color-glass-border: rgba(139, 117, 169, 0.35);
            --color-accent: #7d6b96; --color-accent-hover: #6b5a82;
            --shadow: 0 4px 16px rgba(139, 117, 169, 0.08);
        }
        [data-theme="dark"] {
            --color-bg-base: #120f1a; --color-bg-elevated: #221b2e;
            --color-text-primary: #e8e4f0; --color-text-secondary: #b3a8c8;
            --color-glass-base: rgba(37, 31, 53, 0.85);
            --color-glass-border: rgba(184, 164, 212, 0.15);
            --color-accent: #c5b3e0; --color-accent-hover: #d5c7ea;
            --shadow: 0 6px 24px rgba(0, 0, 0, 0.4);
        }
        html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--color-bg-base); color: var(--color-text-primary); display: flex; flex-direction: column; }
        .glass-panel { background: var(--color-glass-base); border: 1px solid var(--color-glass-border); box-shadow: var(--shadow); border-radius: 0.75rem; }
        .background-content { position: fixed; inset: 0; background: radial-gradient(circle at 10% 20%, var(--color-bg-elevated), var(--color-bg-base) 90%); z-index: -1; }

        .search-container { padding: 1.5rem; display: flex; justify-content: center; }
        .search-box { display: flex; gap: 0.5rem; width: 100%; max-width: 600px; }
        .search-input {
            flex: 1; padding: 0.75rem 1rem; font-size: 1.125rem;
            background: var(--color-glass-base); border: 1.5px solid var(--color-glass-border);
            border-radius: 0.75rem; color: var(--color-text-primary); outline: none;
        }
        .search-input:focus { border-color: var(--color-accent); box-shadow: 0 0 0 3px rgba(142, 122, 168, 0.15); }
        .search-input::placeholder { color: var(--color-text-secondary); }
        .search-btn {
            padding: 0.75rem 1.25rem; background: var(--color-accent); color: var(--color-bg-elevated);
            border: none; border-radius: 0.75rem; cursor: pointer; font-size: 1rem; font-weight: 500;
        }
        .search-btn:hover { background: var(--color-accent-hover); }

        .results-container { flex: 1; overflow-y: auto; padding: 0 1.5rem 1.5rem; }
        .results-inner { max-width: 600px; margin: 0 auto; }

        .word-header { margin-bottom: 1rem; }
        .word-title { font-size: 1.75rem; font-weight: 700; }
        .word-phonetic { font-size: 1rem; color: var(--color-text-secondary); margin-left: 0.75rem; }
        .audio-btn { background: none; border: none; cursor: pointer; color: var(--color-accent); vertical-align: middle; }

        .meaning-panel { margin-bottom: 1rem; padding: 1rem 1.25rem; }
        .meaning-pos { font-size: 0.8125rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-accent); margin-bottom: 0.75rem; }
        .def-item { margin-bottom: 0.75rem; padding-left: 1rem; border-left: 2px solid var(--color-glass-border); }
        .def-text { font-size: 0.9375rem; line-height: 1.5; }
        .def-example { font-size: 0.875rem; color: var(--color-text-secondary); font-style: italic; margin-top: 0.25rem; }
        .def-meta { font-size: 0.8125rem; color: var(--color-text-secondary); margin-top: 0.25rem; }
        .copy-btn {
            float: right; background: none; border: 1px solid var(--color-glass-border);
            border-radius: 0.375rem; padding: 0.25rem 0.5rem; font-size: 0.75rem;
            color: var(--color-text-secondary); cursor: pointer;
        }
        .copy-btn:hover { border-color: var(--color-accent); color: var(--color-accent); }

        .source-badge { display:inline-block; font-size:0.6875rem; font-weight:600; padding:0.125rem 0.5rem; border-radius:999px; margin-left:0.5rem; vertical-align:middle; }
        .source-dictionary { background:#7d6b9622; color:#7d6b96; }
        .source-urban { background:#f59e0b22; color:#f59e0b; }
        .source-divider { border-top:1px solid var(--color-glass-border); margin:1.5rem 0; }
        .empty-state { text-align: center; padding: 4rem 2rem; }
        .empty-state i { color: var(--color-accent); margin-bottom: 1rem; }
        .error-msg { text-align: center; padding: 2rem; color: var(--color-text-secondary); }
        .loading { text-align: center; padding: 2rem; color: var(--color-text-secondary); }
    </style>
</head>
<body>
    <div class="background-content"></div>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="word-input" class="search-input" placeholder="Type a word..." autofocus
                   onkeydown="if(event.key==='Enter')lookupWord()">
            <button class="search-btn" onclick="lookupWord()">
                <i data-lucide="search" class="w-5 h-5" style="display:inline;vertical-align:middle;"></i>
            </button>
        </div>
    </div>

    <div class="results-container">
        <div class="results-inner" id="results">
            <div class="empty-state">
                <i data-lucide="book-open" style="width: 48px; height: 48px; display: block; margin: 0 auto 1rem;"></i>
                <h2 style="font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem;">Dictionary</h2>
                <p style="color: var(--color-text-secondary);">Type a word to look up its definition</p>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const html = document.documentElement;
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            html.setAttribute('data-theme', localStorage.getItem('theme') || (prefersDark ? 'dark' : 'light'));
            window.addEventListener('message', function(e) {
                if (e.data && e.data.type === 'theme-change') html.setAttribute('data-theme', e.data.theme);
            });
        })();

        document.addEventListener('DOMContentLoaded', function() { lucide.createIcons(); });

        function lookupWord() {
            const word = document.getElementById('word-input').value.trim();
            if (!word) return;

            const results = document.getElementById('results');
            results.innerHTML = '<div class="loading"><i data-lucide="loader" class="w-5 h-5" style="display:inline;animation:spin 1s linear infinite;"></i> Looking up...</div>';
            lucide.createIcons();

            fetch('api/lookup?q=' + encodeURIComponent(word))
                .then(r => { if (!r.ok) return r.json().then(d => { throw new Error(d.error); }); return r.json(); })
                .then(result => renderResult(result))
                .catch(err => { results.innerHTML = '<div class="error-msg">' + esc(err.message) + '</div>'; });

            if (window.parent !== window) {
                window.parent.postMessage({ type: 'localitas-navigate', search: '?q=' + encodeURIComponent(word) }, '*');
            }
        }

        function renderResult(result) {
            const results = document.getElementById('results');
            let html = '<div class="word-header"><span class="word-title">' + esc(result.word) + '</span></div>';

            for (let i = 0; i < (result.entries || []).length; i++) {
                const entry = result.entries[i];
                if (i > 0) html += '<div class="source-divider"></div>';

                const sourceLabel = entry.source === 'urban' ? 'Urban Dictionary' : 'Dictionary';
                const sourceClass = entry.source === 'urban' ? 'source-urban' : 'source-dictionary';
                html += '<div style="margin-bottom:0.5rem;">';
                html += '<span class="source-badge ' + sourceClass + '">' + sourceLabel + '</span>';
                if (entry.phonetic) html += '<span class="word-phonetic">' + esc(entry.phonetic) + '</span>';
                if (entry.audio) html += ' <button class="audio-btn" onclick="new Audio(\'' + esc(entry.audio) + '\').play()"><i data-lucide="volume-2" class="w-4 h-4" style="display:inline;"></i></button>';
                html += '</div>';

                for (const meaning of (entry.meanings || [])) {
                    let panelText = meaning.part_of_speech + ':\n';
                    html += '<div class="meaning-panel glass-panel">';
                    html += '<div class="meaning-pos">' + esc(meaning.part_of_speech);
                    html += '<button class="copy-btn" onclick="copyPanel(this)"><i data-lucide="copy" class="w-3 h-3" style="display:inline;"></i> Copy</button>';
                    html += '</div>';

                    for (const def of (meaning.definitions || [])) {
                        html += '<div class="def-item">';
                        html += '<div class="def-text">' + esc(def.definition) + '</div>';
                        panelText += '• ' + def.definition + '\n';
                        if (def.example) {
                            html += '<div class="def-example">"' + esc(def.example) + '"</div>';
                            panelText += '  Example: ' + def.example + '\n';
                        }
                        if (def.synonyms && def.synonyms.length > 0) {
                            html += '<div class="def-meta">Synonyms: ' + def.synonyms.slice(0, 5).map(esc).join(', ') + '</div>';
                        }
                        html += '</div>';
                    }
                    html += '<textarea class="copy-data" style="display:none;">' + esc(panelText) + '</textarea>';
                    html += '</div>';
                }
            }

            results.innerHTML = html;
            lucide.createIcons();
        }

        function copyPanel(btn) {
            const panel = btn.closest('.meaning-panel');
            const data = panel.querySelector('.copy-data');
            if (data) {
                navigator.clipboard.writeText(data.value).then(() => {
                    btn.innerHTML = '<i data-lucide="check" class="w-3 h-3" style="display:inline;"></i> Copied';
                    lucide.createIcons();
                    setTimeout(() => { btn.innerHTML = '<i data-lucide="copy" class="w-3 h-3" style="display:inline;"></i> Copy'; lucide.createIcons(); }, 2000);
                });
            }
        }

        function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        const urlParams = new URLSearchParams(window.location.search);
        const q = urlParams.get('q');
        if (q) { document.getElementById('word-input').value = q; lookupWord(); }
    </script>
    <style>@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }</style>
</body>
</html>
{{end}}
